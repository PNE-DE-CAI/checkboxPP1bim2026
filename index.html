<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gestão de Checklists · URE Caieiras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.0/css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a2f6c 0%, #041a3a 100%); min-height: 100vh; padding: 20px; color: #212121; }
        .container { max-width: 1400px; margin: 0 auto; background: #0f1a24; border-radius: 48px; padding: 20px; box-shadow: 0 30px 35px rgba(0,0,0,0.5); border: 1px solid #d32f2f; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #0a2f6ccc; backdrop-filter: blur(4px); padding: 12px 24px; border-radius: 60px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { max-height: 50px; background: white; border-radius: 12px; padding: 4px; }
        .logo-area span { font-size: 1.2rem; font-weight: 600; color: #ffec9e; }
        .user-info { background: #0a2f6c99; padding: 6px 18px; border-radius: 40px; color: white; display: flex; align-items: center; gap: 12px; }
        .btn-logout { background: #d32f2f; border: none; padding: 5px 12px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; }
        .card { background: white; border-radius: 32px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .card h2 { color: #0a2f6c; border-left: 4px solid #d32f2f; padding-left: 1rem; margin-bottom: 1.2rem; font-size: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, #27ae60, #1e8449); border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .progress-bar { background: #e0e0e0; border-radius: 30px; height: 8px; overflow: hidden; margin: 5px 0; }
        .progress-fill { background: #d32f2f; width: 0%; height: 100%; }
        .school-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        .school-card { background: white; border-radius: 24px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; border: 1px solid #e0e4e9; }
        .school-card:hover { transform: translateY(-4px); }
        .school-card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #0a2f6c; }
        .dashboard-table { width: 100%; border-collapse: collapse; }
        .dashboard-table th, .dashboard-table td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .dashboard-table th { background: #f5f5f5; }
        .school-row { cursor: pointer; }
        .school-row:hover { background: #f0f0f0; }
        .week-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .week-btn { background: #e0e4e9; border: none; padding: 8px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .week-btn.active { background: #d32f2f; color: white; }
        .checklist-item { display: flex; align-items: flex-start; gap: 12px; margin: 12px 0; padding: 8px; border-radius: 16px; background: #f8f9fa; }
        .checklist-item input { margin-top: 3px; width: 20px; height: 20px; accent-color: #0a2f6c; }
        .date-range { font-size: 0.7rem; color: #666; margin-left: 6px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 1.5rem; position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1.5rem; font-size: 1.8rem; cursor: pointer; color: #666; }
        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; border-bottom: 2px solid #e0e4e9; }
        .tab-button { background: none; border: none; padding: 8px 16px; font-weight: 600; cursor: pointer; color: #666; }
        .tab-button.active { color: #0a2f6c; border-bottom: 2px solid #d32f2f; }
        .toast { position: fixed; bottom: 20px; left: 20px; background: #2ecc71; color: white; padding: 10px 20px; border-radius: 40px; font-weight: 500; z-index: 1100; opacity: 0; transition: opacity 0.3s; }
        footer { text-align: center; margin-top: 2rem; padding: 1rem; color: #b4c8e0; font-size: 0.8rem; }
        @media (max-width: 700px) { .school-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <img src="https://i.ibb.co/0p01LzxB/logo3de.jpg" alt="Logo SEDUC">
            <span>URE Caieiras · Checklists 2026</span>
        </div>
        <div class="user-info" id="userInfo" style="display: none;">
            <span id="userNameDisplay"></span>
            <button id="logoutBtn" class="btn-logout">Sair</button>
        </div>
    </div>

    <div id="loginPanel">
        <div class="card" style="max-width: 400px; margin: 0 auto; text-align: center;">
            <h2>🔐 Acesso Administrativo</h2>
            <input type="email" id="loginEmail" placeholder="E-mail" value="admin@urecaieiras.com" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #ccc;">
            <input type="password" id="loginPassword" placeholder="Senha" value="123456" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #ccc;">
            <button id="doLoginBtn" class="btn-primary" style="width:100%; justify-content: center;">Entrar</button>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> Dashboard de Progresso</h2>
            <div style="overflow-x: auto;"><table class="dashboard-table" id="dashboardTable"><thead><tr><th>Escola</th><th>Progresso</th><th>Status</th></tr></thead><tbody id="dashboardBody"></tbody></table></div>
        </div>
        <div class="card">
            <h2><i class="fas fa-school"></i> Escolas</h2>
            <div class="school-grid" id="schoolGrid"></div>
        </div>
    </div>

    <div id="schoolModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><h3 id="modalSchoolName"></h3><div class="tab-bar"><button class="tab-button active" data-modal-tab="prova">📝 Prova Paulista</button><button class="tab-button" data-modal-tab="tarefa">💻 Tarefa SP</button></div><div id="modalProvaPanel"><div class="week-tabs" id="modalProvaWeeks"></div><div id="modalProvaChecklist"></div></div><div id="modalTarefaPanel" style="display: none;"><div class="week-tabs" id="modalTarefaWeeks"></div><div id="modalTarefaChecklist"></div></div><div style="margin-top:20px; text-align:right;"><button id="saveModalChecklist" class="btn-primary"><i class="fas fa-save"></i> Salvar</button></div></div></div>
    <div id="toastMsg" class="toast"></div>
    <footer>Checklist oficial 2026 · Dados salvos</footer>
</div>

<script>
    (function() {
// ==================== CONFIGURAÇÃO SUPABASE ====================
        const SUPABASE_URL = 'https://mrpiwlnzbksjvcaxerrr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_XR4ym7Nz1sL_7Ap5kpmzgw_7mxWANuI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// ================================================================

        const escolasList = [
            "E.E. ADAIL JARBAS DUCLOS", "E.E. AFONSO MORENO", "E.E. ALADINO POLON", "E.E. ALBERTO GRAF – CAPITÃO",
            "E.E. ALBINO FIORE", "E.E. ALFRIED THEODOR WEISZFLOG", "E.E. ANA MARIA GARRIDO ORLANDIN – PROF.ª",
            "E.E. APARECIDO ROBERTO TONELLOTTI – PROF.", "E.E. ARMANDO SESTINI", "E.E. ARTHUR WEINGRILL",
            "E.E. AZEVEDO SOARES", "E.E. BAIRRO DO ITAIM", "E.E. BAIRRO JUNDIAIZINHO", "E.E. BELÉM DA SERRA",
            "E.E. BENEDITO APARECIDO TAVARES – PROF.", "E.E. BENEDITO FAGUNDES MARQUES",
            "E.E. BUENO DE AZEVEDO FILHO – PROF.", "E.E. CARLOS AUGUSTO DE PÁDUA FLEURY – PROF.",
            "E.E. CELESTINA VALENTE LENGENFELDER – PROF.ª", "E.E. CHÁCARA CAMPONESA/ Jd Vassouras",
            "E.E. DOMINGOS CAMBIAGHI – PROF.", "E.E. ÉLCIO JOSÉ PEREIRA COTRIM – PROF.",
            "E.E. ELVIRA PARADA MANGA – PROF.ª", "E.E. FRANCISCO GONÇALVES VIEIRA – PROFº",
            "E.E. HERMELINA DE ALBUQUERQUE PASSARELLA – PROF.ª", "E.E. IRACI SARTORI VIEIRA DA SILVA – PROF.ª",
            "E.E. ISAÍAS LUIZ MATIAZZO", "E.E. ISAURA DE MIRANDA BOTTO – PROFª", "E.E. ISAURA VALENTINI HANSER – PROFª",
            "E.E. IVONE DOS ANJOS DA SILVA CAMPOS – PROF.ª", "E.E. JARDIM ALEGRIA II", "E.E. JARDIM DAS ROSAS",
            "E.E. JARDIM SÃO FRANCISCO", "E.E. JARDIM SILVIA II", "E.E. JOAQUIM MARQUES DA SILVA SOBRINHO – TTE.",
            "E.E. JOCIMARA VIEIRA DA SILVA – PROF.ª", "E.E. JOSÉ CARLOS DA SILVA JUNIOR",
            "E.E. JOSÉ DE BARROS MARTINS – EDITOR", "E.E. JOSÉ PARADA – PROF.", "E.E. JOSÉ ROBERTO MELCHIOR – DR.",
            "E.E. KÁTIA MARIA TARIFA LEME TONELLI – PROF.ª", "E.E. LENITA CORRÊA CAMARGO – PROF.ª",
            "E.E. LUIZ ALEXANDRE DOS SANTOS – VEREADOR", "E.E. LYDIA SCALET WALKER – PROF.ª",
            "E.E. MARIA ZEZA GOMES DE OLIVEIRA", "E.E. MARIO TOLEDO DE MORAES – DR.", "E.E. NAIR HANNICKEL ROMARO",
            "E.E. NELSON MANZANARES – DR.", "E.E. NIDE ZAIM CARDOSO – PROF.ª", "E.E. ODARICO OLIVEIRA NASCIMENTO – PROF.",
            "E.E. OTTO WEISZFLOG", "E.E. OZILDE ALBUQUERQUE PASSARELLA – DR.", "E.E. PARQUE CENTO E VINTE II",
            "E.E. PAULO DUARTE", "E.E. PEDRO GALRÃO DO NASCIMENTO", "E.E. PEDRO LELIS DE SOUZA – PREFEITO",
            "E.E. PEDRO PAULO AGUIAR", "E.E. PIETRO PETRI", "E.E. RITUCO MITANI – PROF.ª",
            "E.E. ROGÉRIO LEVORIN – PROF.", "E.E. SUZANA DIAS", "E.E. ULYSSES SANCHES RAMIRES – PROF.",
            "E.E. VINCENZO LOBASSI", "E.E. WALTER RIBAS DE ANDRADE – PROF.", "E.E. WALTHER WEISZFLOG",
            "E.E. ZILTON BICUDO – PROF.", "E.E. OLINDO DÁRTORA – DR."
        ];

        const weekDates = {
            prova: { 1: "06/04 a 10/04", 2: "13/04 a 17/04", 3: "20/04 a 24/04", 4: "27/04 a 30/04" },
            tarefa: { 1: "06/04 a 13/04", 2: "14/04 a 20/04", 3: "21/04 a 27/04", 4: "28/04 a 30/04" }
        };

        const checklistsData = {
            prova: {
                semana1: [ "Repassar com a equipe informações essenciais (modelos de prova, regras de aplicação, conduta dos aplicadores)", "Organizar equipe de aplicadores e salas necessárias", "Planejar atendimento da educação especial (tempo extra, sala extra, apoio especializado)", "Preparar ambiente com silêncio, organização e acessibilidade", "Reforçar regras de aplicação e reconhecimento do caderno/cartão de resposta", "Garantir locais adequados para recebimento das provas" ],
                semana2: [ "Na URE, conferir quantidade de caixas, lacres e identificação externa", "Verificar nas caixas qual delas contém as etiquetas dos estudantes e comunicar divergências", "Abrir as caixas para conferir a quantidade de envelopes (sem abrir os envelopes)", "Abrir os envelopes apenas nos dias de aplicação (14 a 17/04)", "Antes de iniciar: registrar horário na lousa, recolher celulares e organizar mochilas", "Distribuir as provas corretamente por cor (roxo, verde, laranja)", "Após início da prova, colar etiqueta nominal, conferir cabeçalho e coletar assinatura", "Garantir prova individual, uso de caneta azul/preta e tempo entre 1h e 2h30", "Recolher todos os cadernos e não destacar a folha de respostas", "Subir os cartões-resposta no mesmo dia, conferindo antes de salvar" ],
                semana3: [ "Finalizar a leitura de cartões pendentes (até 23/04)", "Usar fluxo manual em caso de problema com foto ou falta de etiqueta", "Revisar qualidade das imagens (folha inteira, reta, sem sombra, sem corte)" ],
                semana4: [ "Acompanhar publicação dos resultados no Diário de Classe (30/04)", "Organizar devolutiva interna com equipe gestora e pedagógica" ]
            },
            tarefa: {
                semana1: [ "Informar professores e estudantes sobre a janela de realização (06 a 13/04)", "Organizar quando os estudantes farão as tarefas (aula, contraturno, reforço ou casa)", "Acompanhar se todos acessaram as quatro tarefas previstas", "Orientar os estudantes a finalizar dentro do prazo", "Orientar professores sobre uso da ferramenta para verificar aprendizagem", "Explicar que a discursiva passa por correção assistida por IA" ],
                semana2: [ "Mapear tarefas em rascunho, submetidas e pendentes", "Apoiar estudantes cuja resposta discursiva foi devolvida como pendente", "Identificar barreiras de uso (tempo, valor pedagógico, acesso/infraestrutura)" ],
                semana3: [ "Verificar quantas tarefas foram realizadas no prazo", "Verificar quantas ficaram fora do prazo, incompletas ou não realizadas", "Priorizar ações com turmas e estudantes com maior número de pendências" ],
                semana4: [ "Usar os dados disponíveis para devolutiva pedagógica e planejamento de retomadas", "Registrar percepções da equipe sobre engajamento e dificuldades" ]
            }
        };

        let currentUser = null;
        let schoolsDataMap = new Map();

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.style.backgroundColor = isError ? '#e67e22' : '#2ecc71';
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        function computeProgress(checklistData) {
            let total = 0, checked = 0;
            for (let type of ['prova', 'tarefa']) {
                for (let w = 1; w <= 4; w++) {
                    const weekKey = `semana${w}`;
                    const items = checklistsData[type][weekKey] || [];
                    const saved = checklistData?.[type]?.[weekKey] || {};
                    total += items.length;
                    for (let i = 0; i < items.length; i++) if (saved[i] === true) checked++;
                }
            }
            return total === 0 ? 0 : Math.round((checked / total) * 100);
        }

        async function loadAllSchoolsData() {
            const { data, error } = await supabase.from('checklist_escolas').select('*');
            if (error) throw error;
            return data || [];
        }

        async function saveSchoolData(escolaNome, checklistData) {
            const existing = schoolsDataMap.get(escolaNome);
            if (existing && existing.id) {
                const { error } = await supabase.from('checklist_escolas')
                    .update({ checklist_data: checklistData, updated_at: new Date() })
                    .eq('id', existing.id);
                if (error) throw error;
                existing.checklist_data = checklistData;
            } else {
                const { data, error } = await supabase.from('checklist_escolas')
                    .insert([{ escola_nome: escolaNome, checklist_data: checklistData }])
                    .select();
                if (error) throw error;
                if (data && data[0]) {
                    schoolsDataMap.set(escolaNome, { id: data[0].id, checklist_data: checklistData });
                } else {
                    schoolsDataMap.set(escolaNome, { checklist_data: checklistData });
                }
            }
        }

        async function refreshUI() {
            try {
                const allData = await loadAllSchoolsData();
                schoolsDataMap.clear();
                allData.forEach(item => schoolsDataMap.set(item.escola_nome, { id: item.id, checklist_data: item.checklist_data }));
                for (const escola of escolasList) if (!schoolsDataMap.has(escola)) schoolsDataMap.set(escola, { checklist_data: { prova: {}, tarefa: {} } });

                const tbody = document.getElementById('dashboardBody');
                tbody.innerHTML = '';
                for (const escola of escolasList) {
                    const data = schoolsDataMap.get(escola)?.checklist_data || { prova: {}, tarefa: {} };
                    const percent = computeProgress(data);
                    const row = tbody.insertRow();
                    row.classList.add('school-row');
                    row.onclick = () => openSchoolModal(escola, data);
                    row.insertCell(0).innerText = escola;
                    row.insertCell(1).innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div><small>${percent}%</small>`;
                    row.insertCell(2).innerText = percent === 100 ? '✅ Completo' : (percent > 0 ? '⏳ Em andamento' : '❌ Não iniciado');
                }
                const grid = document.getElementById('schoolGrid');
                grid.innerHTML = '';
                for (const escola of escolasList) {
                    const data = schoolsDataMap.get(escola)?.checklist_data || { prova: {}, tarefa: {} };
                    const percent = computeProgress(data);
                    const card = document.createElement('div');
                    card.className = 'school-card';
                    card.onclick = () => openSchoolModal(escola, data);
                    card.innerHTML = `<h3>${escola}</h3><div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div><div>${percent}%</div>`;
                    grid.appendChild(card);
                }
            } catch (err) {
                console.error(err);
                showToast("Erro ao carregar dados: " + err.message, true);
            }
        }

        // Modal (igual ao anterior, mas sem mudanças)
        let currentModalSchool = null, currentModalData = null, modalActiveTab = 'prova', modalActiveWeek = 1;
        function openSchoolModal(escolaNome, checklistData) {
            currentModalSchool = escolaNome;
            currentModalData = JSON.parse(JSON.stringify(checklistData));
            document.getElementById('modalSchoolName').innerText = escolaNome;
            document.getElementById('schoolModal').style.display = 'flex';
            modalActiveTab = 'prova'; modalActiveWeek = 1;
            renderModalWeeks(); renderModalChecklist();
        }
        function renderModalWeeks() {
            const weeks = [1,2,3,4];
            const provaContainer = document.getElementById('modalProvaWeeks');
            const tarefaContainer = document.getElementById('modalTarefaWeeks');
            provaContainer.innerHTML = ''; tarefaContainer.innerHTML = '';
            weeks.forEach(w => {
                const btn1 = document.createElement('button');
                btn1.innerHTML = `Semana ${w} <span class="date-range">(${weekDates.prova[w]})</span>`;
                btn1.className = `week-btn ${modalActiveTab === 'prova' && modalActiveWeek === w ? 'active' : ''}`;
                btn1.onclick = () => { modalActiveWeek = w; renderModalWeeks(); renderModalChecklist(); };
                provaContainer.appendChild(btn1);
                const btn2 = document.createElement('button');
                btn2.innerHTML = `Semana ${w} <span class="date-range">(${weekDates.tarefa[w]})</span>`;
                btn2.className = `week-btn ${modalActiveTab === 'tarefa' && modalActiveWeek === w ? 'active' : ''}`;
                btn2.onclick = () => { modalActiveWeek = w; renderModalWeeks(); renderModalChecklist(); };
                tarefaContainer.appendChild(btn2);
            });
        }
        function renderModalChecklist() {
            const weekKey = `semana${modalActiveWeek}`;
            const items = checklistsData[modalActiveTab][weekKey] || [];
            const saved = currentModalData?.[modalActiveTab]?.[weekKey] || {};
            const container = document.getElementById(`modal${modalActiveTab === 'prova' ? 'ProvaChecklist' : 'TarefaChecklist'}`);
            if (!container) return;
            container.innerHTML = '';
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'checklist-item';
                div.innerHTML = `<input type="checkbox" data-week="${weekKey}" data-idx="${idx}" ${saved[idx] === true ? 'checked' : ''}><label>${item}</label>`;
                container.appendChild(div);
            });
            container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const week = cb.dataset.week;
                    const idx = parseInt(cb.dataset.idx);
                    if (!currentModalData[modalActiveTab]) currentModalData[modalActiveTab] = {};
                    if (!currentModalData[modalActiveTab][week]) currentModalData[modalActiveTab][week] = {};
                    currentModalData[modalActiveTab][week][idx] = cb.checked;
                });
            });
        }
        async function saveModalData() {
            if (!currentModalSchool) return;
            try {
                await saveSchoolData(currentModalSchool, currentModalData);
                await refreshUI();
                closeModal();
                showToast(`✅ ${currentModalSchool} salvo com sucesso!`);
            } catch (err) {
                console.error(err);
                showToast(`❌ Erro ao salvar: ${err.message}. Verifique se a tabela 'checklist_escolas' existe e as políticas RLS estão corretas.`, true);
            }
        }
        function closeModal() { document.getElementById('schoolModal').style.display = 'none'; currentModalSchool = null; }

        // Login
        async function doLogin(email, password) {
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                document.getElementById('userNameDisplay').innerHTML = `👩‍🏫 Admin: ${email}`;
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userInfo').style.display = 'flex';
                await refreshUI();
                showToast("Login realizado com sucesso!");
            } catch (err) {
                alert("Erro no login: " + err.message);
            }
        }

        // Eventos
        document.getElementById('doLoginBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            doLogin(email, pass);
        };
        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('mainPanel').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
        };
        document.querySelector('.close-modal').onclick = closeModal;
        window.onclick = (e) => { if (e.target === document.getElementById('schoolModal')) closeModal(); };
        document.getElementById('saveModalChecklist').onclick = saveModalData;
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                modalActiveTab = btn.dataset.modalTab;
                document.getElementById('modalProvaPanel').style.display = modalActiveTab === 'prova' ? 'block' : 'none';
                document.getElementById('modalTarefaPanel').style.display = modalActiveTab === 'tarefa' ? 'block' : 'none';
                modalActiveWeek = 1;
                renderModalWeeks(); renderModalChecklist();
            };
        });

        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userNameDisplay').innerHTML = `👩‍🏫 Admin: ${session.user.email}`;
                refreshUI();
            }
        }).catch(() => { document.getElementById('loginPanel').style.display = 'block'; });
    })();
</script>
</body>
</html>
