<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Checklist Escolas · URE Caieiras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.0/css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a2f6c 0%, #041a3a 100%); min-height: 100vh; padding: 20px; color: #212121; }
        .container { max-width: 1200px; margin: 0 auto; background: #0f1a24; border-radius: 48px; padding: 20px; box-shadow: 0 30px 35px rgba(0,0,0,0.5); border: 1px solid #d32f2f; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #0a2f6ccc; backdrop-filter: blur(4px); padding: 12px 24px; border-radius: 60px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { max-height: 50px; background: white; border-radius: 12px; padding: 4px; }
        .logo-area span { font-size: 1.2rem; font-weight: 600; color: #ffec9e; }
        .user-info { background: #0a2f6c99; padding: 6px 18px; border-radius: 40px; color: white; display: flex; align-items: center; gap: 12px; }
        .btn-logout { background: #d32f2f; border: none; padding: 5px 12px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; }
        .card { background: white; border-radius: 32px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .card h2 { color: #0a2f6c; border-left: 4px solid #d32f2f; padding-left: 1rem; margin-bottom: 1.2rem; font-size: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, #27ae60, #1e8449); border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 1rem; }
        .btn-primary:hover { transform: translateY(-2px); }
        .progress-bar { background: #e0e0e0; border-radius: 30px; height: 8px; overflow: hidden; margin: 5px 0; }
        .progress-fill { background: #d32f2f; width: 0%; height: 100%; }
        .school-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .school-row:hover { background: #f0f0f0; }
        .school-name { font-weight: 600; width: 30%; }
        .school-progress { width: 60%; }
        .status-icon { width: 10%; text-align: center; }
        .back-btn { background: #6c757d; border: none; padding: 8px 16px; border-radius: 40px; color: white; cursor: pointer; margin-bottom: 1rem; display: inline-flex; align-items: center; gap: 8px; }
        .checklist-item { display: flex; align-items: flex-start; gap: 12px; margin: 12px 0; padding: 8px; border-radius: 16px; background: #f8f9fa; }
        .checklist-item input { margin-top: 3px; width: 20px; height: 20px; accent-color: #0a2f6c; }
        .readonly-checkbox { opacity: 0.6; pointer-events: none; }
        .week-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .week-btn { background: #e0e4e9; border: none; padding: 8px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .week-btn.active { background: #d32f2f; color: white; }
        .date-range { font-size: 0.7rem; color: #666; margin-left: 6px; }
        footer { text-align: center; margin-top: 2rem; padding: 1rem; color: #b4c8e0; font-size: 0.8rem; }
        @media (max-width: 700px) { .school-row { flex-direction: column; align-items: flex-start; gap: 8px; } .school-name, .school-progress, .status-icon { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <img src="https://i.ibb.co/0p01LzxB/logo3de.jpg" alt="Logo SEDUC">
            <span>URE Caieiras · Checklists 2026</span>
        </div>
        <div class="user-info" id="userInfo" style="display: none;">
            <span id="userNameDisplay"></span>
            <button id="logoutBtn" class="btn-logout">Sair</button>
        </div>
    </div>

    <!-- Tela de Login -->
    <div id="loginPanel">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>🎓 Acesso ao Sistema</h2>
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <button id="showSchoolLoginBtn" class="btn-primary" style="background: #0a2f6c; flex:1;">🏫 Escola</button>
                <button id="showPecLoginBtn" class="btn-primary" style="background: #6c757d; flex:1;">👩‍🏫 PEC Admin</button>
            </div>
            <div id="schoolLoginPanel" style="display: block;">
                <input type="email" id="loginEmail" placeholder="E-mail da escola" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #ccc;">
                <input type="password" id="loginPassword" placeholder="Senha" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #ccc;">
                <button id="doLoginBtn" class="btn-primary" style="width:100%; justify-content: center;">Entrar</button>
                <hr style="margin: 15px 0;">
                <p style="text-align:center;"><strong>Não tem cadastro?</strong></p>
                <select id="cadastroEscola" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                    <option value="">Selecione sua escola</option>
                </select>
                <input type="email" id="cadastroEmail" placeholder="E-mail da escola" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                <input type="password" id="cadastroPassword" placeholder="Senha" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                <button id="doCadastroBtn" class="btn-primary" style="width:100%; justify-content: center; background: #27ae60;">Cadastrar Escola</button>
            </div>
            <div id="pecLoginPanel" style="display: none;">
                <input type="email" id="pecEmail" placeholder="E-mail do PEC Admin" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                <input type="password" id="pecPassword" placeholder="Senha" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                <button id="doPecLoginBtn" class="btn-primary" style="width:100%; justify-content: center;">Entrar como PEC Admin</button>
            </div>
        </div>
    </div>

    <!-- Painel da Escola (checklists editáveis) -->
    <div id="schoolPanel" style="display: none;">
        <div class="card">
            <h2 id="schoolNameTitle"></h2>
            <div class="tab-bar" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="schoolTabProva" class="btn-primary" style="background: #0a2f6c; margin:0;">📝 Prova Paulista</button>
                <button id="schoolTabTarefa" class="btn-primary" style="background: #6c757d; margin:0;">💻 Tarefa SP</button>
            </div>
            <div id="schoolProvaPanel">
                <div class="week-tabs" id="provaWeeks"></div>
                <div id="provaChecklist"></div>
                <button id="saveProvaBtn" class="btn-primary"><i class="fas fa-save"></i> Salvar Progresso</button>
            </div>
            <div id="schoolTarefaPanel" style="display: none;">
                <div class="week-tabs" id="tarefaWeeks"></div>
                <div id="tarefaChecklist"></div>
                <button id="saveTarefaBtn" class="btn-primary"><i class="fas fa-save"></i> Salvar Progresso</button>
            </div>
        </div>
    </div>

    <!-- Painel do PEC Admin -->
    <div id="pecPanel" style="display: none;">
        <div id="pecMainView">
            <div class="card" style="text-align: center;">
                <button id="loadDashboardBtn" class="btn-primary" style="background: #0a2f6c; font-size: 1.2rem;"><i class="fas fa-chart-line"></i> Ver Dashboard das Escolas</button>
            </div>
            <div id="dashboardContainer" style="display: none;">
                <div class="card">
                    <h2><i class="fas fa-chart-line"></i> Progresso das Escolas</h2>
                    <div id="pecDashboard"></div>
                </div>
            </div>
        </div>
        <div id="pecSchoolDetailView" style="display: none;">
            <button id="backToDashboardBtn" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar ao Dashboard</button>
            <div class="card">
                <h2 id="detailSchoolName"></h2>
                <div class="tab-bar" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button id="detailTabProva" class="btn-primary" style="background: #0a2f6c; margin:0;">📝 Prova Paulista</button>
                    <button id="detailTabTarefa" class="btn-primary" style="background: #6c757d; margin:0;">💻 Tarefa SP</button>
                </div>
                <div id="detailProvaPanel">
                    <div class="week-tabs" id="detailProvaWeeks"></div>
                    <div id="detailProvaChecklist"></div>
                </div>
                <div id="detailTarefaPanel" style="display: none;">
                    <div class="week-tabs" id="detailTarefaWeeks"></div>
                    <div id="detailTarefaChecklist"></div>
                </div>
                <p style="margin-top: 1rem; font-size: 0.8rem; color: #666;"><i class="fas fa-eye"></i> Visualização apenas de leitura</p>
            </div>
        </div>
    </div>
    <footer>Checklist oficial 2026 · URE Caieiras</footer>
</div>

<script>
    (function() {
        if (window._checklistInitialized) return;
        window._checklistInitialized = true;

// ==================== CONFIGURAÇÃO SUPABASE ====================
        const SUPABASE_URL = 'https://mrpiwlnzbksjvcaxerrr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_XR4ym7Nz1sL_7Ap5kpmzgw_7mxWANuI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// ================================================================

        const escolasList = [
            "E.E. ADAIL JARBAS DUCLOS", "E.E. AFONSO MORENO", "E.E. ALADINO POLON", "E.E. ALBERTO GRAF – CAPITÃO",
            "E.E. ALBINO FIORE", "E.E. ALFRIED THEODOR WEISZFLOG", "E.E. ANA MARIA GARRIDO ORLANDIN – PROF.ª",
            "E.E. APARECIDO ROBERTO TONELLOTTI – PROF.", "E.E. ARMANDO SESTINI", "E.E. ARTHUR WEINGRILL",
            "E.E. AZEVEDO SOARES", "E.E. BAIRRO DO ITAIM", "E.E. BAIRRO JUNDIAIZINHO", "E.E. BELÉM DA SERRA",
            "E.E. BENEDITO APARECIDO TAVARES – PROF.", "E.E. BENEDITO FAGUNDES MARQUES",
            "E.E. BUENO DE AZEVEDO FILHO – PROF.", "E.E. CARLOS AUGUSTO DE PÁDUA FLEURY – PROF.",
            "E.E. CELESTINA VALENTE LENGENFELDER – PROF.ª", "E.E. CHÁCARA CAMPONESA/ Jd Vassouras",
            "E.E. DOMINGOS CAMBIAGHI – PROF.", "E.E. ÉLCIO JOSÉ PEREIRA COTRIM – PROF.",
            "E.E. ELVIRA PARADA MANGA – PROF.ª", "E.E. FRANCISCO GONÇALVES VIEIRA – PROFº",
            "E.E. HERMELINA DE ALBUQUERQUE PASSARELLA – PROF.ª", "E.E. IRACI SARTORI VIEIRA DA SILVA – PROF.ª",
            "E.E. ISAÍAS LUIZ MATIAZZO", "E.E. ISAURA DE MIRANDA BOTTO – PROFª", "E.E. ISAURA VALENTINI HANSER – PROFª",
            "E.E. IVONE DOS ANJOS DA SILVA CAMPOS – PROF.ª", "E.E. JARDIM ALEGRIA II", "E.E. JARDIM DAS ROSAS",
            "E.E. JARDIM SÃO FRANCISCO", "E.E. JARDIM SILVIA II", "E.E. JOAQUIM MARQUES DA SILVA SOBRINHO – TTE.",
            "E.E. JOCIMARA VIEIRA DA SILVA – PROF.ª", "E.E. JOSÉ CARLOS DA SILVA JUNIOR",
            "E.E. JOSÉ DE BARROS MARTINS – EDITOR", "E.E. JOSÉ PARADA – PROF.", "E.E. JOSÉ ROBERTO MELCHIOR – DR.",
            "E.E. KÁTIA MARIA TARIFA LEME TONELLI – PROF.ª", "E.E. LENITA CORRÊA CAMARGO – PROF.ª",
            "E.E. LUIZ ALEXANDRE DOS SANTOS – VEREADOR", "E.E. LYDIA SCALET WALKER – PROF.ª",
            "E.E. MARIA ZEZA GOMES DE OLIVEIRA", "E.E. MARIO TOLEDO DE MORAES – DR.", "E.E. NAIR HANNICKEL ROMARO",
            "E.E. NELSON MANZANARES – DR.", "E.E. NIDE ZAIM CARDOSO – PROF.ª", "E.E. ODARICO OLIVEIRA NASCIMENTO – PROF.",
            "E.E. OTTO WEISZFLOG", "E.E. OZILDE ALBUQUERQUE PASSARELLA – DR.", "E.E. PARQUE CENTO E VINTE II",
            "E.E. PAULO DUARTE", "E.E. PEDRO GALRÃO DO NASCIMENTO", "E.E. PEDRO LELIS DE SOUZA – PREFEITO",
            "E.E. PEDRO PAULO AGUIAR", "E.E. PIETRO PETRI", "E.E. RITUCO MITANI – PROF.ª",
            "E.E. ROGÉRIO LEVORIN – PROF.", "E.E. SUZANA DIAS", "E.E. ULYSSES SANCHES RAMIRES – PROF.",
            "E.E. VINCENZO LOBASSI", "E.E. WALTER RIBAS DE ANDRADE – PROF.", "E.E. WALTHER WEISZFLOG",
            "E.E. ZILTON BICUDO – PROF.", "E.E. OLINDO DÁRTORA – DR."
        ];

        const weekDates = {
            prova: { 1: "06/04 a 10/04", 2: "13/04 a 17/04", 3: "20/04 a 24/04", 4: "27/04 a 30/04" },
            tarefa: { 1: "06/04 a 13/04", 2: "14/04 a 20/04", 3: "21/04 a 27/04", 4: "28/04 a 30/04" }
        };

        const checklistsData = {
            prova: {
                semana1: [ "Repassar com a equipe informações essenciais (modelos de prova, regras de aplicação, conduta dos aplicadores)", "Organizar equipe de aplicadores e salas necessárias", "Planejar atendimento da educação especial (tempo extra, sala extra, apoio especializado)", "Preparar ambiente com silêncio, organização e acessibilidade", "Reforçar regras de aplicação e reconhecimento do caderno/cartão de resposta", "Garantir locais adequados para recebimento das provas" ],
                semana2: [ "Na URE, conferir quantidade de caixas, lacres e identificação externa", "Verificar nas caixas qual delas contém as etiquetas dos estudantes e comunicar divergências", "Abrir as caixas para conferir a quantidade de envelopes (sem abrir os envelopes)", "Abrir os envelopes apenas nos dias de aplicação (14 a 17/04)", "Antes de iniciar: registrar horário na lousa, recolher celulares e organizar mochilas", "Distribuir as provas corretamente por cor (roxo, verde, laranja)", "Após início da prova, colar etiqueta nominal, conferir cabeçalho e coletar assinatura", "Garantir prova individual, uso de caneta azul/preta e tempo entre 1h e 2h30", "Recolher todos os cadernos e não destacar a folha de respostas", "Subir os cartões-resposta no mesmo dia, conferindo antes de salvar" ],
                semana3: [ "Finalizar a leitura de cartões pendentes (até 23/04)", "Usar fluxo manual em caso de problema com foto ou falta de etiqueta", "Revisar qualidade das imagens (folha inteira, reta, sem sombra, sem corte)" ],
                semana4: [ "Acompanhar publicação dos resultados no Diário de Classe (30/04)", "Organizar devolutiva interna com equipe gestora e pedagógica" ]
            },
            tarefa: {
                semana1: [ "Informar professores e estudantes sobre a janela de realização (06 a 13/04)", "Organizar quando os estudantes farão as tarefas (aula, contraturno, reforço ou casa)", "Acompanhar se todos acessaram as quatro tarefas previstas", "Orientar os estudantes a finalizar dentro do prazo", "Orientar professores sobre uso da ferramenta para verificar aprendizagem", "Explicar que a discursiva passa por correção assistida por IA" ],
                semana2: [ "Mapear tarefas em rascunho, submetidas e pendentes", "Apoiar estudantes cuja resposta discursiva foi devolvida como pendente", "Identificar barreiras de uso (tempo, valor pedagógico, acesso/infraestrutura)" ],
                semana3: [ "Verificar quantas tarefas foram realizadas no prazo", "Verificar quantas ficaram fora do prazo, incompletas ou não realizadas", "Priorizar ações com turmas e estudantes com maior número de pendências" ],
                semana4: [ "Usar os dados disponíveis para devolutiva pedagógica e planejamento de retomadas", "Registrar percepções da equipe sobre engajamento e dificuldades" ]
            }
        };

        let currentUser = null;
        let currentRole = null; // 'school' or 'pec_admin'
        let currentEscolaNome = null;
        let savedChecklists = { prova: {}, tarefa: {} };
        let activeSchoolTab = 'prova';
        let activeSchoolWeek = 1;

        let selectedSchoolName = null;
        let selectedSchoolData = null;
        let detailActiveTab = 'prova';
        let detailActiveWeek = 1;

        function populateEscolas() {
            const select = document.getElementById('cadastroEscola');
            select.innerHTML = '<option value="">Selecione sua escola</option>';
            escolasList.forEach(e => {
                let opt = document.createElement('option');
                opt.value = e;
                opt.textContent = e;
                select.appendChild(opt);
            });
        }

        // ==================== FUNÇÕES DA ESCOLA ====================
        function renderSchoolChecklists() {
            const type = activeSchoolTab;
            const weekKey = `semana${activeSchoolWeek}`;
            const items = checklistsData[type][weekKey] || [];
            const saved = savedChecklists[type]?.[weekKey] || {};
            const container = document.getElementById(`${type}Checklist`);
            if (!container) return;
            container.innerHTML = '';
            items.forEach((item, idx) => {
                const isChecked = saved[idx] === true;
                const div = document.createElement('div');
                div.className = 'checklist-item';
                div.innerHTML = `
                    <input type="checkbox" data-week="${weekKey}" data-idx="${idx}" ${isChecked ? 'checked' : ''}>
                    <label>${item}</label>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll(`#${type}Checklist input[type="checkbox"]`).forEach(cb => {
                cb.addEventListener('change', () => {
                    const week = cb.dataset.week;
                    const idx = cb.dataset.idx;
                    if (!savedChecklists[type][week]) savedChecklists[type][week] = {};
                    savedChecklists[type][week][idx] = cb.checked;
                });
            });
        }

        function renderSchoolWeeks() {
            const weeks = [1,2,3,4];
            const provaContainer = document.getElementById('provaWeeks');
            const tarefaContainer = document.getElementById('tarefaWeeks');
            if (!provaContainer || !tarefaContainer) return;
            provaContainer.innerHTML = '';
            tarefaContainer.innerHTML = '';
            weeks.forEach(w => {
                const btn1 = document.createElement('button');
                btn1.innerHTML = `Semana ${w} <span class="date-range">(${weekDates.prova[w]})</span>`;
                btn1.className = `week-btn ${activeSchoolTab === 'prova' && activeSchoolWeek === w ? 'active' : ''}`;
                btn1.onclick = () => { activeSchoolWeek = w; renderSchoolWeeks(); renderSchoolChecklists(); };
                provaContainer.appendChild(btn1);
                const btn2 = document.createElement('button');
                btn2.innerHTML = `Semana ${w} <span class="date-range">(${weekDates.tarefa[w]})</span>`;
                btn2.className = `week-btn ${activeSchoolTab === 'tarefa' && activeSchoolWeek === w ? 'active' : ''}`;
                btn2.onclick = () => { activeSchoolWeek = w; renderSchoolWeeks(); renderSchoolChecklists(); };
                tarefaContainer.appendChild(btn2);
            });
        }

        async function loadSchoolData() {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('checklist_escolas')
                .select('*')
                .eq('user_id', currentUser.id)
                .single();
            if (error && error.code !== 'PGRST116') {
                console.error(error);
                return;
            }
            if (data) {
                savedChecklists = data.checklist_data || { prova: {}, tarefa: {} };
                currentEscolaNome = data.escola_nome;
            } else {
                // Tenta pegar dos metadados
                currentEscolaNome = currentUser.user_metadata?.escola_nome || "Escola não definida";
                savedChecklists = { prova: {}, tarefa: {} };
                await supabase.from('checklist_escolas').insert([{
                    user_id: currentUser.id,
                    escola_nome: currentEscolaNome,
                    checklist_data: savedChecklists
                }]);
            }
            // Atualiza exibição do nome da escola no cabeçalho e no título
            document.getElementById('userNameDisplay').innerHTML = `📌 ${currentEscolaNome}`;
            document.getElementById('schoolNameTitle').innerHTML = `📋 Checklist - ${currentEscolaNome}`;
            renderSchoolWeeks();
            renderSchoolChecklists();
        }

        async function saveSchoolChecklists() {
            if (!currentUser) return;
            const { error } = await supabase
                .from('checklist_escolas')
                .update({ checklist_data: savedChecklists, updated_at: new Date() })
                .eq('user_id', currentUser.id);
            if (error) alert('Erro ao salvar: ' + error.message);
            else alert('Progresso salvo com sucesso!');
        }

        // ==================== FUNÇÕES DO PEC ADMIN ====================
        async function fetchAllSchoolsData() {
            const { data, error } = await supabase.from('checklist_escolas').select('*');
            if (error) {
                console.error(error);
                return [];
            }
            return data;
        }

        function computeProgressForSchool(checklistData) {
            let totalItems = 0, totalChecked = 0;
            for (let type of ['prova', 'tarefa']) {
                for (let w = 1; w <= 4; w++) {
                    const weekKey = `semana${w}`;
                    const items = checklistsData[type][weekKey] || [];
                    const saved = checklistData?.[type]?.[weekKey] || {};
                    totalItems += items.length;
                    for (let i = 0; i < items.length; i++) {
                        if (saved[i] === true) totalChecked++;
                    }
                }
            }
            const percent = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;
            return { percent, totalItems, totalChecked };
        }

        async function renderPecDashboard() {
            const schoolsData = await fetchAllSchoolsData();
            const map = new Map();
            schoolsData.forEach(s => map.set(s.escola_nome, s.checklist_data));

            const dashboardDiv = document.getElementById('pecDashboard');
            if (!dashboardDiv) return;
            dashboardDiv.innerHTML = '';
            for (const escola of escolasList) {
                const data = map.get(escola) || { prova: {}, tarefa: {} };
                const { percent } = computeProgressForSchool(data);
                const hasData = Object.keys(data.prova).length > 0 || Object.keys(data.tarefa).length > 0;
                const statusIcon = hasData ? (percent === 100 ? '✅' : '⏳') : '❌';
                const statusText = hasData ? (percent === 100 ? 'Completo' : `${percent}% concluído`) : 'Não iniciado';
                const row = document.createElement('div');
                row.className = 'school-row';
                row.onclick = () => showSchoolDetail(escola, data);
                row.innerHTML = `
                    <div class="school-name">${escola}</div>
                    <div class="school-progress">
                        <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                        <small>${statusText}</small>
                    </div>
                    <div class="status-icon">${statusIcon}</div>
                `;
                dashboardDiv.appendChild(row);
            }
        }

        function showSchoolDetail(escolaNome, checklistData) {
            selectedSchoolName = escolaNome;
            selectedSchoolData = checklistData || { prova: {}, tarefa: {} };
            document.getElementById('detailSchoolName').innerHTML = `<i class="fas fa-school"></i> ${escolaNome} - Checklist (somente leitura)`;
            document.getElementById('pecMainView').style.display = 'none';
            document.getElementById('pecSchoolDetailView').style.display = 'block';
            renderSchoolDetailChecklists();
        }

        function renderSchoolDetailChecklists() {
            const weekKey = `semana${detailActiveWeek}`;
            const items = checklistsData[detailActiveTab][weekKey] || [];
            const saved = selectedSchoolData?.[detailActiveTab]?.[weekKey] || {};
            const provaContainer = document.getElementById('detailProvaChecklist');
            const tarefaContainer = document.getElementById('detailTarefaChecklist');
            if (!provaContainer || !tarefaContainer) return;
            if (detailActiveTab === 'prova') {
                provaContainer.innerHTML = '';
                items.forEach((item, idx) => {
                    const isChecked = saved[idx] === true;
                    const div = document.createElement('div');
                    div.className = 'checklist-item';
                    div.innerHTML = `<input type="checkbox" class="readonly-checkbox" ${isChecked ? 'checked' : ''} disabled><label style="opacity:0.8;">${item}</label>`;
                    provaContainer.appendChild(div);
                });
            } else {
                tarefaContainer.innerHTML = '';
                items.forEach((item, idx) => {
                    const isChecked = saved[idx] === true;
                    const div = document.createElement('div');
                    div.className = 'checklist-item';
                    div.innerHTML = `<input type="checkbox" class="readonly-checkbox" ${isChecked ? 'checked' : ''} disabled><label style="opacity:0.8;">${item}</label>`;
                    tarefaContainer.appendChild(div);
                });
            }
        }

        function renderDetailWeeks() {
            const weeks = [1,2,3,4];
            const provaContainer = document.getElementById('detailProvaWeeks');
            const tarefaContainer = document.getElementById('detailTarefaWeeks');
            if (!provaContainer || !tarefaContainer) return;
            provaContainer.innerHTML = '';
            tarefaContainer.innerHTML = '';
            weeks.forEach(w => {
                const btn1 = document.createElement('button');
                btn1.innerHTML = `Semana ${w} <span class="date-range">(${weekDates.prova[w]})</span>`;
                btn1.className = `week-btn ${detailActiveTab === 'prova' && detailActiveWeek === w ? 'active' : ''}`;
                btn1.onclick = () => { detailActiveWeek = w; renderDetailWeeks(); renderSchoolDetailChecklists(); };
                provaContainer.appendChild(btn1);
                const btn2 = document.createElement('button');
                btn2.innerHTML = `Semana ${w} <span class="date-range">(${weekDates.tarefa[w]})</span>`;
                btn2.className = `week-btn ${detailActiveTab === 'tarefa' && detailActiveWeek === w ? 'active' : ''}`;
                btn2.onclick = () => { detailActiveWeek = w; renderDetailWeeks(); renderSchoolDetailChecklists(); };
                tarefaContainer.appendChild(btn2);
            });
        }

        // ==================== AUTENTICAÇÃO ====================
        async function schoolLogin(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { alert('Erro: ' + error.message); return false; }
            currentUser = data.user;
            currentRole = 'school';
            await loadSchoolData();
            return true;
        }

        async function schoolSignup(escola, email, password) {
            const { data, error } = await supabase.auth.signUp({
                email, password,
                options: { data: { escola_nome: escola, role: 'school' } }
            });
            if (error) { alert('Erro: ' + error.message); return false; }
            // Aguarda a confirmação do e-mail? Para testes, podemos criar direto.
            // Mas como o e-mail precisa ser confirmado, talvez seja melhor criar sem confirmação.
            // Para simplificar, vamos inserir na tabela checklist_escolas após confirmação.
            // Como o signUp pode não criar o usuário imediatamente (depende de confirmação), 
            // faremos o insert depois que o usuário fizer login.
            alert('Cadastro realizado! Verifique seu e-mail e faça login.');
            return true;
        }

        async function pecAdminLogin(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { alert('Erro: ' + error.message); return false; }
            const role = data.user.user_metadata?.role;
            if (role !== 'pec_admin') {
                alert('Acesso negado. Você não tem permissão de PEC Admin.');
                await supabase.auth.signOut();
                return false;
            }
            currentUser = data.user;
            currentRole = 'pec_admin';
            document.getElementById('userNameDisplay').innerHTML = `👩‍🏫 PEC Admin: ${data.user.email}`;
            return true;
        }

        // ==================== EVENTOS ====================
        document.getElementById('showSchoolLoginBtn').onclick = () => {
            document.getElementById('schoolLoginPanel').style.display = 'block';
            document.getElementById('pecLoginPanel').style.display = 'none';
        };
        document.getElementById('showPecLoginBtn').onclick = () => {
            document.getElementById('schoolLoginPanel').style.display = 'none';
            document.getElementById('pecLoginPanel').style.display = 'block';
        };
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            if (await schoolLogin(email, pass)) {
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('schoolPanel').style.display = 'block';
                document.getElementById('userInfo').style.display = 'flex';
            }
        };
        document.getElementById('doCadastroBtn').onclick = async () => {
            const escola = document.getElementById('cadastroEscola').value;
            const email = document.getElementById('cadastroEmail').value;
            const pass = document.getElementById('cadastroPassword').value;
            if (!escola || !email || !pass) { alert('Preencha todos os campos'); return; }
            await schoolSignup(escola, email, pass);
        };
        document.getElementById('doPecLoginBtn').onclick = async () => {
            const email = document.getElementById('pecEmail').value;
            const pass = document.getElementById('pecPassword').value;
            if (await pecAdminLogin(email, pass)) {
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('pecPanel').style.display = 'block';
                document.getElementById('userInfo').style.display = 'flex';
                // Reset views
                document.getElementById('pecMainView').style.display = 'block';
                document.getElementById('pecSchoolDetailView').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'none';
            }
        };
        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('schoolPanel').style.display = 'none';
            document.getElementById('pecPanel').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('schoolLoginPanel').style.display = 'block';
            document.getElementById('pecLoginPanel').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('pecEmail').value = '';
            document.getElementById('pecPassword').value = '';
        };
        document.getElementById('saveProvaBtn').onclick = saveSchoolChecklists;
        document.getElementById('saveTarefaBtn').onclick = saveSchoolChecklists;

        document.getElementById('loadDashboardBtn').onclick = async () => {
            const container = document.getElementById('dashboardContainer');
            if (container.style.display === 'none') {
                await renderPecDashboard();
                container.style.display = 'block';
            } else {
                await renderPecDashboard();
            }
        };
        document.getElementById('backToDashboardBtn').onclick = () => {
            document.getElementById('pecMainView').style.display = 'block';
            document.getElementById('pecSchoolDetailView').style.display = 'none';
        };

        // Abas da escola
        document.getElementById('schoolTabProva').onclick = () => {
            activeSchoolTab = 'prova';
            document.getElementById('schoolProvaPanel').style.display = 'block';
            document.getElementById('schoolTarefaPanel').style.display = 'none';
            document.getElementById('schoolTabProva').style.background = '#0a2f6c';
            document.getElementById('schoolTabTarefa').style.background = '#6c757d';
            activeSchoolWeek = 1;
            renderSchoolWeeks();
            renderSchoolChecklists();
        };
        document.getElementById('schoolTabTarefa').onclick = () => {
            activeSchoolTab = 'tarefa';
            document.getElementById('schoolProvaPanel').style.display = 'none';
            document.getElementById('schoolTarefaPanel').style.display = 'block';
            document.getElementById('schoolTabTarefa').style.background = '#0a2f6c';
            document.getElementById('schoolTabProva').style.background = '#6c757d';
            activeSchoolWeek = 1;
            renderSchoolWeeks();
            renderSchoolChecklists();
        };

        // Abas do detalhe (admin)
        document.getElementById('detailTabProva').onclick = () => {
            detailActiveTab = 'prova';
            document.getElementById('detailProvaPanel').style.display = 'block';
            document.getElementById('detailTarefaPanel').style.display = 'none';
            document.getElementById('detailTabProva').style.background = '#0a2f6c';
            document.getElementById('detailTabTarefa').style.background = '#6c757d';
            detailActiveWeek = 1;
            renderDetailWeeks();
            renderSchoolDetailChecklists();
        };
        document.getElementById('detailTabTarefa').onclick = () => {
            detailActiveTab = 'tarefa';
            document.getElementById('detailProvaPanel').style.display = 'none';
            document.getElementById('detailTarefaPanel').style.display = 'block';
            document.getElementById('detailTabTarefa').style.background = '#0a2f6c';
            document.getElementById('detailTabProva').style.background = '#6c757d';
            detailActiveWeek = 1;
            renderDetailWeeks();
            renderSchoolDetailChecklists();
        };

        // Inicialização
        populateEscolas();
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                currentUser = session.user;
                const role = session.user.user_metadata?.role;
                if (role === 'pec_admin') {
                    currentRole = 'pec_admin';
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('pecPanel').style.display = 'block';
                    document.getElementById('userInfo').style.display = 'flex';
                    document.getElementById('userNameDisplay').innerHTML = `👩‍🏫 PEC Admin: ${session.user.email}`;
                } else {
                    currentRole = 'school';
                    loadSchoolData().then(() => {
                        document.getElementById('loginPanel').style.display = 'none';
                        document.getElementById('schoolPanel').style.display = 'block';
                        document.getElementById('userInfo').style.display = 'flex';
                    });
                }
            } else {
                document.getElementById('loginPanel').style.display = 'block';
            }
        });
    })();
</script>
</body>
</html>
