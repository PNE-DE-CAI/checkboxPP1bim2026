<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Checklist Escolas · URE Caieiras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a2f6c 0%, #041a3a 100%); min-height: 100vh; padding: 20px; color: #212121; }
        :root { --azul-escuro: #0a2f6c; --azul-claro: #eef3fb; --vermelho: #d32f2f; --branco: #ffffff; --preto: #212121; --cinza-borda: #e0e4e9; }
        .container { max-width: 1280px; margin: 0 auto; background: #0f1a24; border-radius: 48px; padding: 20px; box-shadow: 0 30px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.1); border: 1px solid var(--vermelho); }
        .header { display: flex; justify-content: space-between; align-items: center; background: #0a2f6ccc; backdrop-filter: blur(4px); padding: 12px 24px; border-radius: 60px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { max-height: 50px; width: auto; background: white; border-radius: 12px; padding: 4px; }
        .logo-area span { font-size: 1.2rem; font-weight: 600; color: #ffec9e; }
        .countdown { background: #1e4663; padding: 8px 20px; border-radius: 40px; font-weight: bold; color: white; }
        .countdown span { color: var(--vermelho); font-size: 1.4rem; margin: 0 2px; }
        .user-info { background: #0a2f6c99; padding: 6px 18px; border-radius: 40px; color: white; display: flex; align-items: center; gap: 12px; }
        .btn-logout { background: var(--vermelho); border: none; padding: 5px 12px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; }
        .card { background: var(--branco); border-radius: 32px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: 1px solid var(--cinza-borda); }
        .card h2 { color: var(--azul-escuro); border-left: 4px solid var(--vermelho); padding-left: 1rem; margin-bottom: 1.2rem; font-size: 1.5rem; }
        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; border-bottom: 2px solid var(--cinza-borda); }
        .tab-button { background: none; border: none; padding: 10px 20px; font-size: 1rem; font-weight: 600; color: #666; cursor: pointer; border-radius: 40px 40px 0 0; transition: 0.2s; }
        .tab-button.active { background: var(--azul-escuro); color: white; }
        .week-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .week-btn { background: #e0e4e9; border: none; padding: 8px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .week-btn.active { background: var(--vermelho); color: white; }
        .checklist-item { display: flex; align-items: flex-start; gap: 12px; margin: 12px 0; padding: 8px; border-radius: 16px; background: #f8f9fa; }
        .checklist-item input { margin-top: 3px; width: 20px; height: 20px; cursor: pointer; accent-color: var(--azul-escuro); }
        .checklist-item label { flex: 1; font-size: 0.95rem; color: var(--preto); cursor: pointer; }
        .save-btn { background: linear-gradient(135deg, #27ae60, #1e8449); border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; margin-top: 1rem; display: inline-flex; align-items: center; gap: 8px; }
        .save-btn:hover { transform: translateY(-2px); }
        footer { text-align: center; margin-top: 2rem; padding: 1rem; color: #b4c8e0; font-size: 0.8rem; border-top: 1px solid #2c4c6e; }
        @media (max-width: 700px) { .container { padding: 12px; } .checklist-item { flex-wrap: wrap; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo-area">
            <img src="https://i.ibb.co/0p01LzxB/logo3de.jpg" alt="Logo SEDUC">
            <span>URE Caieiras · Checklists 2026</span>
        </div>
        <div class="countdown" id="countdownTimer">📅 <span id="dias">0</span> dias para a Prova Paulista</div>
        <div class="user-info" id="userInfo" style="display: none;">
            <span id="userNameDisplay"></span>
            <button id="logoutBtn" class="btn-logout">Sair</button>
        </div>
    </div>

    <div id="loginPanel">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>🎓 Acesso das Escolas</h2>
            <div style="margin-bottom: 20px;">
                <button id="showLoginBtn" class="save-btn" style="background: var(--azul-escuro);">Entrar</button>
                <button id="showCadastroBtn" class="save-btn" style="background: #6c757d;">Cadastrar Escola</button>
            </div>
            <div id="loginForm" style="display: block;">
                <input type="email" id="loginEmail" placeholder="E-mail da escola" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #ccc;">
                <input type="password" id="loginPassword" placeholder="Senha" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #ccc;">
                <button id="doLoginBtn" class="save-btn" style="width:100%; justify-content: center;">Entrar</button>
            </div>
            <div id="cadastroForm" style="display: none;">
                <select id="cadastroEscola" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                    <option value="">Selecione sua escola</option>
                </select>
                <input type="email" id="cadastroEmail" placeholder="E-mail da escola" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                <input type="password" id="cadastroPassword" placeholder="Senha" style="width:100%; margin:8px 0; padding:12px; border-radius:40px;">
                <button id="doCadastroBtn" class="save-btn" style="width:100%; justify-content: center;">Cadastrar</button>
            </div>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        <div class="tab-bar">
            <button class="tab-button active" data-tab="prova">📝 Prova Paulista</button>
            <button class="tab-button" data-tab="tarefa">💻 Tarefa SP</button>
        </div>
        <div id="provaPanel" class="tab-content">
            <div class="week-tabs" id="provaWeeks"></div>
            <div id="provaChecklist"></div>
            <button id="saveProvaBtn" class="save-btn"><i class="fas fa-save"></i> Salvar Progresso</button>
        </div>
        <div id="tarefaPanel" class="tab-content" style="display: none;">
            <div class="week-tabs" id="tarefaWeeks"></div>
            <div id="tarefaChecklist"></div>
            <button id="saveTarefaBtn" class="save-btn"><i class="fas fa-save"></i> Salvar Progresso</button>
        </div>
    </div>
    <footer>Checklist oficial 2026 · URE Caieiras</footer>
</div>

<script>
    (function() {
        // Evita duplicação
        if (window._checklistInitialized) return;
        window._checklistInitialized = true;

        // ==================== CONFIGURAÇÃO SUPABASE ====================
        const SUPABASE_URL = 'https://mrpiwlnzbksjvcaxerrr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_XR4ym7Nz1sL_7Ap5kpmzgw_7mxWANuI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // ================================================================

        const escolasList = [
            "E.E. ADAIL JARBAS DUCLOS", "E.E. AFONSO MORENO", "E.E. ALADINO POLON", "E.E. ALBERTO GRAF – CAPITÃO",
            "E.E. ALBINO FIORE", "E.E. ALFRIED THEODOR WEISZFLOG", "E.E. ANA MARIA GARRIDO ORLANDIN – PROF.ª",
            "E.E. APARECIDO ROBERTO TONELLOTTI – PROF.", "E.E. ARMANDO SESTINI", "E.E. ARTHUR WEINGRILL",
            "E.E. AZEVEDO SOARES", "E.E. BAIRRO DO ITAIM", "E.E. BAIRRO JUNDIAIZINHO", "E.E. BELÉM DA SERRA",
            "E.E. BENEDITO APARECIDO TAVARES – PROF.", "E.E. BENEDITO FAGUNDES MARQUES",
            "E.E. BUENO DE AZEVEDO FILHO – PROF.", "E.E. CARLOS AUGUSTO DE PÁDUA FLEURY – PROF.",
            "E.E. CELESTINA VALENTE LENGENFELDER – PROF.ª", "E.E. CHÁCARA CAMPONESA/ Jd Vassouras",
            "E.E. DOMINGOS CAMBIAGHI – PROF.", "E.E. ÉLCIO JOSÉ PEREIRA COTRIM – PROF.",
            "E.E. ELVIRA PARADA MANGA – PROF.ª", "E.E. FRANCISCO GONÇALVES VIEIRA – PROFº",
            "E.E. HERMELINA DE ALBUQUERQUE PASSARELLA – PROF.ª", "E.E. IRACI SARTORI VIEIRA DA SILVA – PROF.ª",
            "E.E. ISAÍAS LUIZ MATIAZZO", "E.E. ISAURA DE MIRANDA BOTTO – PROFª", "E.E. ISAURA VALENTINI HANSER – PROFª",
            "E.E. IVONE DOS ANJOS DA SILVA CAMPOS – PROF.ª", "E.E. JARDIM ALEGRIA II", "E.E. JARDIM DAS ROSAS",
            "E.E. JARDIM SÃO FRANCISCO", "E.E. JARDIM SILVIA II", "E.E. JOAQUIM MARQUES DA SILVA SOBRINHO – TTE.",
            "E.E. JOCIMARA VIEIRA DA SILVA – PROF.ª", "E.E. JOSÉ CARLOS DA SILVA JUNIOR",
            "E.E. JOSÉ DE BARROS MARTINS – EDITOR", "E.E. JOSÉ PARADA – PROF.", "E.E. JOSÉ ROBERTO MELCHIOR – DR.",
            "E.E. KÁTIA MARIA TARIFA LEME TONELLI – PROF.ª", "E.E. LENITA CORRÊA CAMARGO – PROF.ª",
            "E.E. LUIZ ALEXANDRE DOS SANTOS – VEREADOR", "E.E. LYDIA SCALET WALKER – PROF.ª",
            "E.E. MARIA ZEZA GOMES DE OLIVEIRA", "E.E. MARIO TOLEDO DE MORAES – DR.", "E.E. NAIR HANNICKEL ROMARO",
            "E.E. NELSON MANZANARES – DR.", "E.E. NIDE ZAIM CARDOSO – PROF.ª", "E.E. ODARICO OLIVEIRA NASCIMENTO – PROF.",
            "E.E. OTTO WEISZFLOG", "E.E. OZILDE ALBUQUERQUE PASSARELLA – DR.", "E.E. PARQUE CENTO E VINTE II",
            "E.E. PAULO DUARTE", "E.E. PEDRO GALRÃO DO NASCIMENTO", "E.E. PEDRO LELIS DE SOUZA – PREFEITO",
            "E.E. PEDRO PAULO AGUIAR", "E.E. PIETRO PETRI", "E.E. RITUCO MITANI – PROF.ª",
            "E.E. ROGÉRIO LEVORIN – PROF.", "E.E. SUZANA DIAS", "E.E. ULYSSES SANCHES RAMIRES – PROF.",
            "E.E. VINCENZO LOBASSI", "E.E. WALTER RIBAS DE ANDRADE – PROF.", "E.E. WALTHER WEISZFLOG",
            "E.E. ZILTON BICUDO – PROF.", "E.E. OLINDO DÁRTORA – DR."
        ];

        const checklistsData = {
            prova: {
                semana1: [
                    "Repassar com a equipe informações essenciais (modelos de prova, regras de aplicação, conduta dos aplicadores)",
                    "Organizar equipe de aplicadores e salas necessárias",
                    "Planejar atendimento da educação especial (tempo extra, sala extra, apoio especializado)",
                    "Preparar ambiente com silêncio, organização e acessibilidade",
                    "Reforçar regras de aplicação e reconhecimento do caderno/cartão de resposta",
                    "Garantir locais adequados para recebimento das provas"
                ],
                semana2: [
                    "Na URE, conferir quantidade de caixas, lacres e identificação externa",
                    "Verificar nas caixas qual delas contém as etiquetas dos estudantes e comunicar divergências",
                    "Abrir as caixas para conferir a quantidade de envelopes (sem abrir os envelopes)",
                    "Abrir os envelopes apenas nos dias de aplicação (14 a 17/04)",
                    "Antes de iniciar: registrar horário na lousa, recolher celulares e organizar mochilas",
                    "Distribuir as provas corretamente por cor (roxo, verde, laranja)",
                    "Após início da prova, colar etiqueta nominal, conferir cabeçalho e coletar assinatura",
                    "Garantir prova individual, uso de caneta azul/preta e tempo entre 1h e 2h30",
                    "Recolher todos os cadernos e não destacar a folha de respostas",
                    "Subir os cartões-resposta no mesmo dia, conferindo antes de salvar"
                ],
                semana3: [
                    "Finalizar a leitura de cartões pendentes (até 23/04)",
                    "Usar fluxo manual em caso de problema com foto ou falta de etiqueta",
                    "Revisar qualidade das imagens (folha inteira, reta, sem sombra, sem corte)"
                ],
                semana4: [
                    "Acompanhar publicação dos resultados no Diário de Classe (30/04)",
                    "Organizar devolutiva interna com equipe gestora e pedagógica"
                ]
            },
            tarefa: {
                semana1: [
                    "Informar professores e estudantes sobre a janela de realização (06 a 13/04)",
                    "Organizar quando os estudantes farão as tarefas (aula, contraturno, reforço ou casa)",
                    "Acompanhar se todos acessaram as quatro tarefas previstas",
                    "Orientar os estudantes a finalizar dentro do prazo",
                    "Orientar professores sobre uso da ferramenta para verificar aprendizagem",
                    "Explicar que a discursiva passa por correção assistida por IA"
                ],
                semana2: [
                    "Mapear tarefas em rascunho, submetidas e pendentes",
                    "Apoiar estudantes cuja resposta discursiva foi devolvida como pendente",
                    "Identificar barreiras de uso (tempo, valor pedagógico, acesso/infraestrutura)"
                ],
                semana3: [
                    "Verificar quantas tarefas foram realizadas no prazo",
                    "Verificar quantas ficaram fora do prazo, incompletas ou não realizadas",
                    "Priorizar ações com turmas e estudantes com maior número de pendências"
                ],
                semana4: [
                    "Usar os dados disponíveis para devolutiva pedagógica e planejamento de retomadas",
                    "Registrar percepções da equipe sobre engajamento e dificuldades"
                ]
            }
        };

        let currentUser = null;
        let currentEscola = null;
        let savedChecklists = { prova: {}, tarefa: {} };
        let activeTab = 'prova';
        let activeWeek = 1;

        function populateEscolas() {
            const select = document.getElementById('cadastroEscola');
            select.innerHTML = '<option value="">Selecione sua escola</option>';
            escolasList.forEach(e => {
                let opt = document.createElement('option');
                opt.value = e;
                opt.textContent = e;
                select.appendChild(opt);
            });
        }

        function updateCountdown() {
            const target = new Date(2026, 3, 14);
            const today = new Date();
            const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            document.getElementById('dias').innerText = diff > 0 ? diff : 0;
        }
        setInterval(updateCountdown, 86400000);
        updateCountdown();

        function renderChecklists() {
            const type = activeTab;
            const data = checklistsData[type];
            const weekKey = `semana${activeWeek}`;
            const items = data[weekKey] || [];
            const saved = savedChecklists[type]?.[weekKey] || {};
            const container = document.getElementById(`${type}Checklist`);
            if (!container) return;
            container.innerHTML = '';
            items.forEach((item, idx) => {
                const isChecked = saved[idx] === true;
                const div = document.createElement('div');
                div.className = 'checklist-item';
                div.innerHTML = `
                    <input type="checkbox" data-week="${weekKey}" data-idx="${idx}" ${isChecked ? 'checked' : ''}>
                    <label>${item}</label>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll(`#${type}Checklist input[type="checkbox"]`).forEach(cb => {
                cb.addEventListener('change', () => {
                    const week = cb.dataset.week;
                    const idx = cb.dataset.idx;
                    if (!savedChecklists[type][week]) savedChecklists[type][week] = {};
                    savedChecklists[type][week][idx] = cb.checked;
                });
            });
        }

        function renderWeeks() {
            const weeks = [1, 2, 3, 4];
            const provaContainer = document.getElementById('provaWeeks');
            const tarefaContainer = document.getElementById('tarefaWeeks');
            provaContainer.innerHTML = '';
            tarefaContainer.innerHTML = '';
            weeks.forEach(w => {
                const btn1 = document.createElement('button');
                btn1.innerText = `Semana ${w}`;
                btn1.className = `week-btn ${activeTab === 'prova' && activeWeek === w ? 'active' : ''}`;
                btn1.onclick = () => { activeWeek = w; renderWeeks(); renderChecklists(); };
                provaContainer.appendChild(btn1);
                const btn2 = document.createElement('button');
                btn2.innerText = `Semana ${w}`;
                btn2.className = `week-btn ${activeTab === 'tarefa' && activeWeek === w ? 'active' : ''}`;
                btn2.onclick = () => { activeWeek = w; renderWeeks(); renderChecklists(); };
                tarefaContainer.appendChild(btn2);
            });
        }

        async function loadUserData() {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('checklist_escolas')
                .select('*')
                .eq('user_id', currentUser.id)
                .single();
            if (error && error.code !== 'PGRST116') {
                console.error(error);
                return;
            }
            if (data) {
                savedChecklists = data.checklist_data || { prova: {}, tarefa: {} };
                currentEscola = data.escola_nome;
            } else {
                savedChecklists = { prova: {}, tarefa: {} };
                currentEscola = "Escola não definida";
                await supabase.from('checklist_escolas').insert([{
                    user_id: currentUser.id,
                    escola_nome: currentEscola,
                    checklist_data: savedChecklists
                }]);
            }
            document.getElementById('userNameDisplay').innerText = `📌 ${currentEscola}`;
            renderWeeks();
            renderChecklists();
        }

        async function saveChecklists() {
            if (!currentUser) return;
            const { error } = await supabase
                .from('checklist_escolas')
                .update({ checklist_data: savedChecklists, updated_at: new Date() })
                .eq('user_id', currentUser.id);
            if (error) alert('Erro ao salvar: ' + error.message);
            else alert('Progresso salvo com sucesso!');
        }

        async function login(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { alert('Erro: ' + error.message); return false; }
            currentUser = data.user;
            await loadUserData();
            return true;
        }

        async function cadastrar(escola, email, password) {
            const { data, error } = await supabase.auth.signUp({
                email, password,
                options: { data: { escola_nome: escola } }
            });
            if (error) { alert('Erro: ' + error.message); return false; }
            alert('Cadastro realizado! Faça login.');
            return true;
        }

        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('cadastroForm').style.display = 'none';
        };
        document.getElementById('showCadastroBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('cadastroForm').style.display = 'block';
            populateEscolas();
        };
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            if (await login(email, pass)) {
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
            }
        };
        document.getElementById('doCadastroBtn').onclick = async () => {
            const escola = document.getElementById('cadastroEscola').value;
            const email = document.getElementById('cadastroEmail').value;
            const pass = document.getElementById('cadastroPassword').value;
            if (!escola || !email || !pass) { alert('Preencha todos os campos'); return; }
            await cadastrar(escola, email, pass);
        };
        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('mainPanel').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        };
        document.getElementById('saveProvaBtn').onclick = saveChecklists;
        document.getElementById('saveTarefaBtn').onclick = saveChecklists;

        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeTab = btn.dataset.tab;
                document.getElementById('provaPanel').style.display = activeTab === 'prova' ? 'block' : 'none';
                document.getElementById('tarefaPanel').style.display = activeTab === 'tarefa' ? 'block' : 'none';
                activeWeek = 1;
                renderWeeks();
                renderChecklists();
            };
        });

        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                currentUser = session.user;
                loadUserData().then(() => {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('mainPanel').style.display = 'block';
                });
            } else {
                document.getElementById('loginPanel').style.display = 'block';
                document.getElementById('mainPanel').style.display = 'none';
            }
        });
    })();
</script>
</body>
</html>
